on:
  push:
    branches:
      - main
    # Don't trigger if tags are pushed
    tags-ignore:
      - "**"

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

env:
  TZ: Europe/Paris

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
