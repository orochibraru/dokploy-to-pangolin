name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Dockerfile"
      - "docker-bake.hcl"
      - "compose.yaml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "biome.json"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "Dockerfile"
      - "docker-bake.hcl"
      - "compose.yaml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "biome.json"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TZ: Europe/Paris

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    env:
      PORT: 3000
    steps:
      - uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Linting
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build
