name: Publish
on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TZ: Europe/Paris

jobs:
  docker:
    name: Docker
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v5

      # PR: Build only (no push)
      - name: Build (PR validation)
        if: github.event_name == 'pull_request'
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl app

      # Only login and push on main branch
      - name: Login to Container registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use 'node' as the release type; it works perfectly for Bun package.json
          release-type: node

      # Main: Build and push
      - name: Build and push
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl --push
